<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - HUDA.VN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">
<div class="container bg-white shadow rounded p-5" style="max-width: 400px;">
    <h2 class="text-center fw-bold text-primary mb-4">ĐĂNG NHẬP</h2>

    <div th:if="${param.error}" class="alert alert-danger small">Sai tài khoản hoặc mật khẩu!</div>
    <div th:if="${param.success}" class="alert alert-success small">Đăng ký doanh nghiệp thành công!</div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label">Email / Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Mật khẩu</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-bold">VÀO HỆ THỐNG</button>
    </form>

    <div class="text-center mt-3">
        <a th:href="@{/oauth2/authorization/google}" class="btn btn-outline-danger w-100">
            <img src="https://www.google.com/favicon.ico" width="16" class="me-2"> Đăng nhập với Google
        </a>
    </div>

    <p class="text-center mt-4 small text-muted">
        Chưa có tài khoản công ty? <a th:href="@{/register}">Đăng ký ngay</a>
    </p>
</div>
</body>
</html>
