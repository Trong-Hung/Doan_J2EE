<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đăng ký Doanh nghiệp - HUDA.VN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">
<div class="container bg-white shadow rounded p-5" style="max-width: 500px;">
    <h3 class="text-center fw-bold text-primary mb-4">KHỞI TẠO DOANH NGHIỆP</h3>
    <form th:action="@{/register}" method="post">
        <div class="mb-3">
            <label class="form-label fw-bold">Tên Công ty</label>
            <input type="text" name="companyName" class="form-control" placeholder="Ví dụ: Mavana Group" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">Địa chỉ trụ sở</label>
            <input type="text" name="address" class="form-control" required>
        </div>
        <hr>
        <div class="mb-3">
            <label class="form-label fw-bold">Email quản trị (Username)</label>
            <input type="email" name="email" class="form-control" placeholder="admin@gmail.com" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">Họ tên người đại diện</label>
            <input type="text" name="fullName" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">Mật khẩu</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-bold py-2">ĐĂNG KÝ HỆ THỐNG</button>
    </form>
</div>
</body>
</html>
