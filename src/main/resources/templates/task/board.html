<!DOCTYPE html>
<html lang="vi"
      class="light-style layout-menu-fixed"
      dir="ltr"
      data-theme="theme-default"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
    <title>Bảng Công Việc - HUDA.VN</title>

    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/assets/vendor/fonts/boxicons.css}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/assets/vendor/css/core.css}" class="template-customizer-core-css" />
    <link rel="stylesheet" th:href="@{/assets/vendor/css/theme-default.css}" class="template-customizer-theme-css" />
    <link rel="stylesheet" th:href="@{/assets/css/demo.css}" />

    <style>
        .task-list-container { height: calc(100vh - 80px); overflow-y: auto; border-right: 1px solid #d9dee3; background: #fff;}
        .task-detail-container { height: calc(100vh - 80px); overflow-y: auto; background: #f5f5f9; }

        .task-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; }
        .task-item:hover { background-color: #f8f9fa; }
        .task-item.active { background-color: #e8f0fe; }

        .card-todo { border-left-color: #8592a3; }
        .card-progress { border-left-color: #696cff; }
        .card-review { border-left-color: #ffab00; }
        .card-success { border-left-color: #71dd37; }
        .card-failed { border-left-color: #ff3e1d; }

        .status-badge { font-size: 0.7rem; font-weight: 600; padding: 3px 8px; border-radius: 12px; }
        .deadline-text { font-size: 0.75rem; font-weight: 600; }
    </style>
</head>

<body>
<div class="layout-wrapper layout-content-navbar">
    <div class="layout-container">

        <aside id="layout-menu" class="layout-menu menu-vertical menu bg-menu-theme">
            <div class="app-brand demo">
                <a th:href="@{/tasks/board}" class="app-brand-link">
                    <span class="app-brand-text demo menu-text fw-bolder ms-2 text-uppercase" style="font-size: 1.2rem;">HUDA.VN</span>
                </a>
            </div>
            <div class="menu-inner-shadow"></div>
            <ul class="menu-inner py-1 mt-3">
                <li class="menu-item active"><a th:href="@{/tasks/board}" class="menu-link"><i class="menu-icon tf-icons bx bx-kanban"></i><div data-i18n="Analytics">Công việc</div></a></li>
                <li class="menu-item"><a th:href="@{/tasks/create}" class="menu-link"><i class="menu-icon tf-icons bx bx-plus-circle"></i><div data-i18n="Layouts">Tạo công việc mới</div></a></li>
                <li class="menu-item"><a th:href="@{/chat}" class="menu-link"><i class="menu-icon tf-icons bx bx-message-rounded-dots"></i><div data-i18n="Chat">Tin nhắn</div></a></li>

                <li class="menu-header small text-uppercase"><span class="menu-header-text">QUẢN TRỊ</span></li>
                <li class="menu-item" sec:authorize="hasAuthority('ADMIN')">
                    <a th:href="@{/admin/users}" class="menu-link"><i class="menu-icon tf-icons bx bx-group"></i><div data-i18n="Account Settings">Quản lý Nhân sự</div></a>
                </li>
            </ul>
        </aside>

        <div class="layout-page">
            <nav class="layout-navbar container-fluid navbar navbar-expand-xl navbar-detached align-items-center bg-navbar-theme" id="layout-navbar">
                <div class="navbar-nav-right d-flex align-items-center w-100" id="navbar-collapse">

                    <div class="nav-item d-flex align-items-center w-100">
                        <i class="bx bx-search fs-4 lh-0"></i>
                        <input type="text" class="form-control border-0 shadow-none w-100" placeholder="Tìm kiếm công việc..." />
                    </div>

                    <ul class="navbar-nav flex-row align-items-center ms-auto">
                        <li class="nav-item navbar-dropdown dropdown-user dropdown">
                            <a class="nav-link dropdown-toggle hide-arrow" href="javascript:void(0);" data-bs-toggle="dropdown">
                                <div class="avatar avatar-online">
                                    <img th:src="${user.avatar != null ? user.avatar : '/assets/img/avatars/1.png'}" alt class="w-px-40 h-auto rounded-circle" style="object-fit: cover;" />
                                </div>
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li>
                                    <a class="dropdown-item" href="#">
                                        <div class="d-flex">
                                            <div class="flex-shrink-0 me-3">
                                                <div class="avatar avatar-online">
                                                    <img th:src="${user.avatar != null ? user.avatar : '/assets/img/avatars/1.png'}" alt class="w-px-40 h-auto rounded-circle" style="object-fit: cover;" />
                                                </div>
                                            </div>
                                            <div class="flex-grow-1">
                                                <span class="fw-semibold d-block" th:text="${user.fullName}">Tên User</span>
                                                <small class="text-muted" th:text="${user.role}">Chức vụ</small>
                                            </div>
                                        </div>
                                    </a>
                                </li>
                                <li><div class="dropdown-divider"></div></li>
                                <li>
                                    <form th:action="@{/logout}" method="post" class="m-0">
                                        <button type="submit" class="dropdown-item text-danger"><i class="bx bx-power-off me-2"></i> <span class="align-middle">Đăng xuất</span></button>
                                    </form>
                                </li>
                            </ul>
                        </li>
                    </ul>

                </div>
            </nav>

            <div class="content-wrapper">
                <div class="container-fluid flex-grow-1 p-0">
                    <div class="row g-0 h-100">

                        <div class="col-md-5 col-lg-4 task-list-container p-0">
                            <div class="p-3 border-bottom d-flex justify-content-between align-items-center bg-white sticky-top" style="z-index: 10;">
                                <h6 class="mb-0 fw-bold"><i class='bx bx-list-ul'></i> DANH SÁCH CÔNG VIỆC</h6>
                                <a th:href="@{/tasks/create}" class="btn btn-sm btn-primary"><i class="bx bx-plus"></i></a>
                            </div>

                            <div th:if="${todo.size() > 0}">
                                <div class="bg-light px-3 py-2 text-muted fw-bold border-bottom" style="font-size: 0.8rem;">CẦN LÀM (<span th:text="${todo.size()}"></span>)</div>
                                <div th:each="t : ${todo}" class="task-item card-todo" th:onclick="'loadTaskDetail(' + ${t.id} + ', this)'">
                                    <div class="d-flex justify-content-between align-items-start mb-1">
                                        <h6 class="mb-0 fw-bold text-dark" th:text="${t.title}"></h6>
                                        <span class="deadline-text text-muted" th:text="${t.deadline != null ? #temporals.format(t.deadline, 'dd/MM') : ''}"></span>
                                    </div>
                                    <div class="d-flex justify-content-between align-items-center mt-2">
                                        <span class="status-badge bg-label-secondary">CẦN LÀM</span>
                                        <div class="avatar avatar-xs" th:if="${t.assignee != null}">
                                            <img th:src="${t.assignee.avatar != null ? t.assignee.avatar : '/assets/img/avatars/1.png'}" class="rounded-circle w-100 h-100" style="object-fit: cover;" th:title="${t.assignee.fullName}" />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div th:if="${inProgress.size() > 0}">
                                <div class="bg-light px-3 py-2 text-muted fw-bold border-bottom border-top" style="font-size: 0.8rem;">ĐANG LÀM (<span th:text="${inProgress.size()}"></span>)</div>
                                <div th:each="t : ${inProgress}" class="task-item card-progress" th:onclick="'loadTaskDetail(' + ${t.id} + ', this)'">
                                    <div class="d-flex justify-content-between align-items-start mb-1">
                                        <h6 class="mb-0 fw-bold text-dark" th:text="${t.title}"></h6>
                                        <span class="deadline-text text-primary" th:text="${t.deadline != null ? #temporals.format(t.deadline, 'dd/MM') : ''}"></span>
                                    </div>
                                    <div class="d-flex justify-content-between align-items-center mt-2">
                                        <span class="status-badge bg-label-primary">ĐANG LÀM</span>
                                        <div class="avatar avatar-xs" th:if="${t.assignee != null}">
                                            <img th:src="${t.assignee.avatar != null ? t.assignee.avatar : '/assets/img/avatars/1.png'}" class="rounded-circle w-100 h-100" style="object-fit: cover;" th:title="${t.assignee.fullName}" />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div th:if="${pendingReview.size() > 0}">
                                <div class="bg-light px-3 py-2 text-muted fw-bold border-bottom border-top" style="font-size: 0.8rem;">CHỜ DUYỆT (<span th:text="${pendingReview.size()}"></span>)</div>
                                <div th:each="t : ${pendingReview}" class="task-item card-review" th:onclick="'loadTaskDetail(' + ${t.id} + ', this)'">
                                    <div class="d-flex justify-content-between align-items-start mb-1">
                                        <h6 class="mb-0 fw-bold text-dark" th:text="${t.title}"></h6>
                                    </div>
                                    <span class="status-badge bg-label-warning mt-2 d-inline-block">CHỜ DUYỆT</span>
                                </div>
                            </div>

                            <div th:if="${success.size() > 0}">
                                <div class="bg-light px-3 py-2 text-muted fw-bold border-bottom border-top" style="font-size: 0.8rem;">HOÀN THÀNH (<span th:text="${success.size()}"></span>)</div>
                                <div th:each="t : ${success}" class="task-item card-success" th:onclick="'loadTaskDetail(' + ${t.id} + ', this)'">
                                    <div class="d-flex justify-content-between align-items-start mb-1">
                                        <h6 class="mb-0 fw-bold text-success" th:text="${t.title}"></h6>
                                    </div>
                                    <span class="status-badge bg-label-success mt-2 d-inline-block">HOÀN THÀNH</span>
                                </div>
                            </div>

                            <div th:if="${failed.size() > 0}">
                                <div class="bg-light px-3 py-2 text-muted fw-bold border-bottom border-top" style="font-size: 0.8rem;">THẤT BẠI (<span th:text="${failed.size()}"></span>)</div>
                                <div th:each="t : ${failed}" class="task-item card-failed" th:onclick="'loadTaskDetail(' + ${t.id} + ', this)'">
                                    <div class="d-flex justify-content-between align-items-start mb-1">
                                        <h6 class="mb-0 fw-bold text-danger" th:text="${t.title}"></h6>
                                    </div>
                                    <span class="status-badge bg-label-danger mt-2 d-inline-block">THẤT BẠI</span>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-7 col-lg-8 task-detail-container p-0 position-relative" id="taskDetailPanel">
                            <div class="d-flex flex-column justify-content-center align-items-center h-100 text-muted">
                                <i class='bx bx-task fs-1 mb-3'></i>
                                <h5>Chọn một công việc bên trái để xem chi tiết</h5>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/assets/vendor/libs/jquery/jquery.js}"></script>
<script th:src="@{/assets/vendor/js/bootstrap.js}"></script>

<script>
    // TẢI NỘI DUNG CHI TIẾT
    function loadTaskDetail(taskId, element) {
        document.querySelectorAll('.task-item').forEach(el => el.classList.remove('active'));
        if(element) element.classList.add('active');
        else if (document.querySelector('.task-item.active') == null) { }

        var panel = document.getElementById('taskDetailPanel');
        panel.innerHTML = '<div class="d-flex justify-content-center align-items-center h-100"><div class="spinner-border text-primary"></div></div>';

        fetch('/tasks/detail/' + taskId)
            .then(res => res.text())
            .then(html => {
                var parser = new DOMParser();
                var doc = parser.parseFromString(html, 'text/html');
                var detailContent = doc.querySelector('.detail-wrapper');

                if(detailContent) {
                    panel.innerHTML = detailContent.outerHTML;
                } else {
                    panel.innerHTML = '<div class="p-4 text-danger">Lỗi: Không tìm thấy nội dung chi tiết.</div>';
                }
            })
            .catch(err => {
                console.error(err);
                panel.innerHTML = '<div class="p-4 text-danger text-center mt-5">Lỗi kết nối máy chủ!</div>';
            });
    }

    // LƯU KẾT QUẢ BẰNG AJAX
    function saveTaskResult(taskId) {
        var resultText = document.getElementById('taskResultText').value;
        var formData = new FormData();
        formData.append('taskId', taskId);
        formData.append('result', resultText);

        fetch('/tasks/update-result', { method: 'POST', body: formData })
            .then(res => res.text())
            .then(msg => {
                alert("Đã cập nhật kết quả thành công!");
                loadTaskDetail(taskId, document.querySelector('.task-item.active'));
            })
            .catch(err => alert("Có lỗi xảy ra: " + err));
    }

    // UPLOAD TÀI LIỆU
    function uploadTaskFile(taskId) {
        var fileInput = document.getElementById('fileUploadInput');
        if (fileInput.files.length === 0) return;

        var formData = new FormData();
        formData.append('file', fileInput.files[0]);
        formData.append('taskId', taskId);

        fileInput.disabled = true;

        fetch('/tasks/upload-file', { method: 'POST', body: formData })
            .then(res => {
                if(res.ok) {
                    alert("Tải tài liệu lên thành công!");
                    loadTaskDetail(taskId, document.querySelector('.task-item.active'));
                } else {
                    alert("Lỗi khi tải file!");
                    fileInput.disabled = false;
                }
            });
    }

    // ĐÃ FIX: CẬP NHẬT TRẠNG THÁI (Lưu ngầm và tự reload danh sách bên trái)
    function updateTaskStatusAjax(taskId, newStatus) {
        var formData = new FormData();
        formData.append('taskId', taskId);
        formData.append('status', newStatus);

        fetch('/tasks/update-status', {
            method: 'POST',
            body: formData
        }).then(() => {
            window.location.reload();
        }).catch(err => alert("Lỗi khi cập nhật trạng thái!"));
    }

    // BÌNH LUẬN KHÔNG LOAD TRANG
    document.getElementById('taskDetailPanel').addEventListener('submit', function(e) {
        e.preventDefault();
        var form = e.target;
        var formData = new FormData(form);

        var btn = form.querySelector('button[type="submit"]');
        if(btn) btn.disabled = true;

        fetch(form.action, {
            method: form.method,
            body: formData
        }).then(res => {
            var taskId = form.querySelector('input[name="taskId"]').value;
            loadTaskDetail(taskId, document.querySelector('.task-item.active'));
        });
    });
</script>
</body>
</html>
