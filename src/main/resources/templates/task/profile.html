<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Hồ sơ cá nhân - HUDA.VN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow mx-auto" style="max-width: 500px; border: none; border-radius: 15px;">
        <div class="card-header bg-primary text-white text-center py-4" style="border-radius: 15px 15px 0 0;">
            <h4 class="mb-0 fw-bold">THÔNG TIN CÁ NHÂN</h4>
        </div>
        <div class="card-body text-center p-5">
            <img th:src="${picture != null ? picture : 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png'}"
                 class="rounded-circle mb-4 border shadow-sm" style="width: 120px; height: 120px; object-fit: cover;">

            <h3 class="fw-bold mb-1" th:text="${name}">Họ và Tên</h3>
            <p class="text-muted mb-4" th:text="${email}">Email người dùng</p>

            <div class="row text-start mb-4">
                <div class="col-6">
                    <small class="text-muted d-block">Vai trò</small>
                    <span class="badge bg-info text-dark" sec:authentication="principal.authorities">ROLE</span>
                </div>
                <div class="col-6">
                    <small class="text-muted d-block">Tài khoản</small>
                    <span class="fw-bold" sec:authentication="name">Username</span>
                </div>
            </div>

            <hr>
            <div class="d-grid gap-2">
                <a th:href="@{/tasks/board}" class="btn btn-outline-primary fw-bold">
                    <i class="bi bi-arrow-left me-2"></i>Quay lại Board
                </a>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-danger w-100 fw-bold">Đăng xuất</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
