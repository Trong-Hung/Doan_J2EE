<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Chi tiết Nhân sự - HUDA.VN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary px-4 mb-4">
    <a class="navbar-brand fw-bold" th:href="@{/tasks/board}">HUDA.VN</a>
    <div class="text-white d-flex align-items-center">
        <a th:href="@{/tasks/board}" class="btn btn-outline-light btn-sm me-3">Về Board</a>
        <form th:action="@{/logout}" method="post" class="d-inline ms-2 mb-0">
            <button class="btn btn-danger btn-sm" type="submit">Thoát</button>
        </form>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-dark text-white d-flex align-items-center">
                    <h5 class="mb-0">Hồ sơ Nhân viên</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-4 text-center">
                            <img th:src="${employee.avatar != null ? employee.avatar : 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png'}"
                                 class="rounded-circle img-thumbnail" width="150" height="150" alt="Avatar">
                            <h4 class="mt-3 fw-bold" th:text="${employee.fullName}"></h4>
                            <p class="text-muted" th:text="${employee.position != null ? employee.position : 'Chức vụ: N/A'}"></p>
                            <span class="badge rounded-pill" th:classappend="${employee.role == 'ADMIN' ? 'bg-danger' : 'bg-primary'}" th:text="${employee.role}"></span>
                        </div>
                        <div class="col-md-8">
                            <h5 class="fw-bold border-bottom pb-2 mb-3">Thông tin chi tiết</h5>
                            <div class="row mb-3">
                                <div class="col-sm-4 text-muted fw-bold">ID Nhân viên:</div>
                                <div class="col-sm-8 text-dark fw-bold" th:text="${employee.id}"></div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-sm-4 text-muted fw-bold">Email đăng nhập:</div>
                                <div class="col-sm-8 text-dark fw-bold" th:text="${employee.username}"></div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-sm-4 text-muted fw-bold">Công ty:</div>
                                <div class="col-sm-8 text-dark fw-bold" th:text="${employee.company != null ? employee.company.name : 'N/A'}"></div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-sm-4 text-muted fw-bold">Phòng ban:</div>
                                <div class="col-sm-8 text-dark fw-bold" th:text="${employee.department != null ? employee.department.name : 'N/A'}"></div>
                            </div>
                            <div class="mt-4 text-end">
                                <a th:href="@{/tasks/board}" class="btn btn-secondary">Quay lại Board</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
