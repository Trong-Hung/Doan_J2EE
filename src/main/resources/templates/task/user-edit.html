<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Chỉnh sửa Nhân sự - HUTECH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0">Cập nhật thông tin nhân viên</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/users/update/{id}(id=${employee.id})}" method="post" th:object="${employee}">

                        <div class="mb-3 text-center">
                            <img th:src="*{avatar != null ? avatar : 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png'}"
                                 class="rounded-circle" width="100" height="100" alt="Avatar">
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-muted">Email đăng nhập (Không thể sửa)</label>
                            <input type="text" class="form-control" th:field="*{username}" readonly disabled>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Họ và tên</label>
                            <input type="text" class="form-control" th:field="*{fullName}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Chức vụ (Position)</label>
                            <input type="text" class="form-control" th:field="*{position}" placeholder="VD: Trưởng phòng, Dev, BA...">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Quyền hạn (Role)</label>
                            <select class="form-select" th:field="*{role}">
                                <option value="USER">Nhân viên (USER)</option>
                                <option value="ADMIN">Quản lý (ADMIN)</option>
                            </select>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success">Lưu thay đổi</button>
                            <a th:href="@{/tasks/board}" class="btn btn-outline-secondary">Quay lại Board</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
